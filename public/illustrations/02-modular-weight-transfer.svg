  </g>

  <!-- left source module -->
  <g stroke="#34322d" stroke-width="1.5" stroke-linejoin="round">
    <polygon points="180,200 248,236 180,272 112,236" fill="#ffffff"/>
    <polygon points="112,236 180,272 180,304 112,268" fill="#efeadf"/>
    <polygon points="180,272 248,236 248,268 180,304" fill="#e4ddcf"/>
