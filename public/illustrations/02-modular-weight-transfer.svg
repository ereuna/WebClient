<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#faf7f0"/>
  <defs>
    <pattern id="dots2" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#e7e0d1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#dots2)"/>
  <path d="M28 28h18M28 28v18M772 28h-18M772 28v18M28 422h18M28 422v-18M772 422h-18M772 422v-18" stroke="#b6ae9d" stroke-width="1.5"/>
  <text x="48" y="44" font-family="monospace" font-size="10" fill="#8a857a" letter-spacing="0.06em">FIG.03  WEIGHT TRANSFER BRIDGE</text>

  <!-- base platform with puzzle recess -->
  <g stroke="#34322d" stroke-width="1.5" stroke-linejoin="round">
    <polygon points="400,310 580,210 400,110 220,210" fill="#ffffff"/>
    <polygon points="220,210 400,310 400,350 220,250" fill="#efeadf"/>
    <polygon points="400,310 580,210 580,250 400,350" fill="#e4ddcf"/>
