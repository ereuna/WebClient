  <!-- transfer path -->
  <polyline points="248,236 352,192 448,192 552,236" fill="none" stroke="#cf5a2a" stroke-width="1.8" stroke-dasharray="6 4"/>
  <circle cx="300" cy="214" r="2.5" fill="#cf5a2a"/>
  <circle cx="500" cy="214" r="2.5" fill="#cf5a2a"/>

  <!-- labels -->
  <g font-family="monospace" font-size="10" fill="#8a857a">
    <text x="400" y="380" text-anchor="middle">PHYSICSSPEC COSINE ’ SHARED WEIGHTS</text>
