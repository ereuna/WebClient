  </g>
  <text x="620" y="196" font-family="monospace" font-size="9" fill="#8a857a" text-anchor="middle">TARGET GNN</text>

  <!-- floating puzzle bridge piece (accent) -->
  <g stroke="#34322d" stroke-width="1.6" stroke-linejoin="round">
    <polygon points="400,168 448,192 400,216 352,192" fill="#f7e2d5" stroke="#cf5a2a"/>
    <polygon points="352,192 400,216 400,240 352,216" fill="#ecc9b4"/>
    <polygon points="400,216 448,192 448,216 400,240" fill="#f3d9c9"/>
