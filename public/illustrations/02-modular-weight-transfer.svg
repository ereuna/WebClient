  </g>
  <text x="180" y="196" font-family="monospace" font-size="9" fill="#8a857a" text-anchor="middle">SOURCE PINN</text>

  <!-- right target module -->
  <g stroke="#34322d" stroke-width="1.5" stroke-linejoin="round">
    <polygon points="620,200 688,236 620,272 552,236" fill="#ffffff"/>
    <polygon points="552,236 620,272 620,304 552,268" fill="#efeadf"/>
    <polygon points="620,272 688,236 688,268 620,304" fill="#e4ddcf"/>
    <circle cx="570" cy="244" r="2" fill="#8a857a"/>
