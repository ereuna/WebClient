<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#faf7f0"/>
  <defs>
    <pattern id="dots5" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#e7e0d1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#dots5)"/>
  <path d="M28 28h18M28 28v18M772 28h-18M772 28v18M28 422h18M28 422v-18M772 422h-18M772 422v-18" stroke="#b6ae9d" stroke-width="1.5"/>
  <text x="48" y="44" font-family="monospace" font-size="10" fill="#8a857a" letter-spacing="0.06em">FIG.06  RESERVOIR THERMAL SLAB</text>

  <!-- deep rock layer -->
  <g stroke="#34322d" stroke-width="1.5" stroke-linejoin="round">
    <polygon points="400,300 560,380 560,410 400,330" fill="#e2dbcc"/>
    <polygon points="240,380 400,300 400,330 240,410" fill="#e9e3d6"/>
    <polygon points="240,380 560,380 560,410 240,410" fill="#d8d0bc"/>
    <line x1="300" y1="380" x2="400" y2="340" stroke="#cfc8b9" stroke-width="0.8"/>
    <line x1="500" y1="380" x2="400" y2="340" stroke="#cfc8b9" stroke-width="0.8"/>
  </g>

  <!-- thermal zone -->
  <g stroke="#34322d" stroke-width="1.5" stroke-linejoin="round">
    <polygon points="400,220 560,300 400,380 240,300" fill="#f6f2ea"/>
    <polygon points="400,258 448,282 400,306 352,282" fill="#f3d3c0" stroke="#cf5a2a" stroke-width="1.4"/>
    <circle cx="400" cy="282" r="7" fill="#cf5a2a"/>
    <path d="M352,282 q24,-28 96,0" fill="none" stroke="#cf5a2a" stroke-width="0.9" opacity="0.4"/>
    <path d="M328,282 q36,-40 144,0" fill="none" stroke="#cf5a2a" stroke-width="0.7" opacity="0.25"/>
  </g>

  <!-- surface cap -->
  <g stroke="#34322d" stroke-width="1.6" stroke-linejoin="round">
    <polygon points="400,140 560,220 400,300 240,220" fill="#ffffff"/>
    <g stroke="#cfc8b9" stroke-width="0.9">
      <line x1="320" y1="180" x2="480" y2="260"/>
      <line x1="480" y1="180" x2="320" y2="260"/>
    </g>
    <circle cx="252" cy="224" r="2.4" fill="#8a857a"/>
    <circle cx="548" cy="224" r="2.4" fill="#8a857a"/>
  </g>

  <!-- well bores -->
  <g stroke="#34322d" stroke-width="1.4">
    <line x1="340" y1="168" x2="340" y2="300"/>
    <line x1="460" y1="182" x2="460" y2="320"/>
  </g>
  <circle cx="340" cy="168" r="4.5" fill="#fff" stroke="#34322d" stroke-width="1.4"/>
  <circle cx="460" cy="182" r="4.5" fill="#cf5a2a"/>
  <circle cx="340" cy="158" r="3" fill="#34c759"/>
  <circle cx="460" cy="172" r="3" fill="#cf5a2a"/>

  <!-- callout -->
  <g stroke="#bdb6a6" stroke-width="1" stroke-dasharray="2 3">
    <line x1="448" y1="282" x2="560" y2="240"/>
  </g>
  <rect x="564" y="222" width="96" height="34" rx="5" fill="#fff" stroke="#e0d9ca" stroke-width="1"/>
  <text x="574" y="238" font-family="monospace" font-size="9" fill="#cf5a2a">T +18°C</text>
  <text x="574" y="250" font-family="monospace" font-size="9" fill="#8a857a">ANOMALY</text>

  <text x="348" y="154" font-family="monospace" font-size="9" fill="#8a857a">OW-47</text>
  <text x="468" y="168" font-family="monospace" font-size="9" fill="#cf5a2a">OW-52</text>
  <text x="400" y="430" font-family="monospace" font-size="9" fill="#8a857a" text-anchor="middle">24 WELLS · INVERSE PINN FIELD</text>
</svg>
