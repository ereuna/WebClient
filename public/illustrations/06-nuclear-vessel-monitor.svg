  <ellipse cx="400" cy="130" rx="82" ry="28" fill="#efeadf" stroke="#34322d" stroke-width="1.2"/>

  <!-- embrittlement band -->
  <path d="M280,210 A120,42 0 0 0 520,210" fill="none" stroke="#cf5a2a" stroke-width="8" opacity="0.85"/>
  <path d="M280,196 A120,42 0 0 0 520,196" fill="none" stroke="#34322d" stroke-width="1" stroke-dasharray="3 4"/>
  <path d="M280,224 A120,42 0 0 0 520,224" fill="none" stroke="#34322d" stroke-width="1" stroke-dasharray="3 4"/>

